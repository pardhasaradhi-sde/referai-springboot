version: "3.9"

services:
  referai-ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: referai-ai-service
    ports:
      - "8010:8010"
    environment:
      APP_NAME: referai-ai-service
      APP_ENV: development
      APP_HOST: 0.0.0.0
      APP_PORT: 8010
      LOG_LEVEL: INFO
      X_INTERNAL_KEY: ${X_INTERNAL_KEY:-change-me}
      POSTGRES_URL: ${POSTGRES_URL:-postgresql://postgres:postgres@host.docker.internal:5432/referai}
      REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379/0}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-text-embedding-004}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
