spring:
  application:
    name: referai-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate         # Flyway owns the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

# JWT
app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: ${APP_JWT_EXPIRATION_MS}       # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

  # Google Gemini
  gemini:
    api-key: ${GEMINI_API_KEY}
    model: ${APP_GEMINI_MODEL:gemini-2.0-flash}
    base-url: https://generativelanguage.googleapis.com/v1beta/models
    max-retries: 3
    base-retry-delay-ms: 1000
    max-retry-delay-ms: 10000

  # Appwrite Storage
  appwrite:
    endpoint: https://sgp.cloud.appwrite.io/v1
    project-id: 69b3a4410037d827ccf9
    api-key: ${APPWRITE_API_KEY}
    bucket-id: referai-resumes

  # Python AI Service
  python-service:
    url: ${PYTHON_SERVICE_URL:http://localhost:8010}
    internal-key: ${PYTHON_INTERNAL_KEY:referai-internal-secret-2026}

logging:
  level:
    com.referai: DEBUG
    org.springframework.security: INFO
    org.springframework.web.socket: DEBUG
